<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Agenda personal LuisJA">
    <title>📋 LuisJA - Agenda</title>
    <link rel="manifest" href="data:application/json,{\"name\":\"LuisJA - Agenda Profesional\",\"short_name\":\"LuisJA\",\"start_url\":\"./\",\"display\":\"standalone\",\"background_color\":\"#ffffff\",\"theme_color\":\"#1E88E5\",\"icons\":[{\"src\":\"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect fill='%231E88E5' width='192' height='192'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-size='80' font-weight='bold' fill='white' font-family='Arial'%3ELJ%3C/text%3E%3C/svg%3E\",\"sizes\":\"192x192\",\"type\":\"image/svg+xml\"}]}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #ffffff;
            color: #333;
            line-height: 1.5;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: #fafafa;
        }

        .header {
            background: linear-gradient(135deg, #1E88E5 0%, #42A5F5 100%);
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            background: white;
            border-bottom: 2px solid #e0e0e0;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #1E88E5;
            border-bottom-color: #1E88E5;
        }

        .content {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .task-item, .note-item {
            background: white;
            border: 1px solid #e0e0e0;
            border-left: 4px solid #1E88E5;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .task-item.completed {
            opacity: 0.6;
            background: #f5f5f5;
        }

        .task-item.urgent {
            border-left-color: #D32F2F;
        }

        .task-item.important {
            border-left-color: #FBC02D;
        }

        .task-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-top: 2px;
            cursor: pointer;
        }

        .task-content {
            flex: 1;
        }

        .task-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .task-meta {
            font-size: 12px;
            color: #999;
        }

        .task-actions {
            display: flex;
            gap: 6px;
        }

        .btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 4px 8px;
        }

        .btn:hover {
            opacity: 0.7;
        }

        .note-item {
            border-left-color: #42A5F5;
        }

        .note-title {
            font-weight: 600;
            margin-bottom: 8px;
        }

        .note-content {
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-word;
            margin-bottom: 8px;
            color: #666;
        }

        .fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            background: #1E88E5;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(30, 136, 229, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .fab:active {
            transform: scale(0.95);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: flex-end;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            width: 100%;
            max-height: 90vh;
            border-radius: 16px 16px 0 0;
            padding: 20px;
            overflow-y: auto;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-header {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 6px;
            color: #333;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-actions {
            display: flex;
            gap: 8px;
            margin-top: 20px;
        }

        .btn-primary, .btn-secondary {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-primary {
            background: #1E88E5;
            color: white;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .empty {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .search-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .search-bar input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
        }

        .search-bar select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }

        .checklist-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            background: #f9f9f9;
            border-radius: 4px;
            margin-bottom: 6px;
        }

        .checklist-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checklist-item span {
            flex: 1;
            font-size: 13px;
        }

        .checklist-item button {
            background: none;
            border: none;
            cursor: pointer;
            color: #999;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 LuisJA</h1>
            <p id="headerDate">Hoy</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="btnAgenda">📅 Agenda</button>
            <button class="tab-btn" id="btnNotas">📝 Notas</button>
        </div>

        <div class="content">
            <!-- AGENDA TAB -->
            <div id="agendaTab" class="tab-content active">
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="🔍 Buscar...">
                    <select id="filterSelect">
                        <option value="">Todas</option>
                        <option value="urgent">🔴 Urgentes</option>
                        <option value="important">🟡 Importantes</option>
                        <option value="normal">⚪ Normales</option>
                    </select>
                </div>
                <div id="tasksList"></div>
            </div>

            <!-- NOTAS TAB -->
            <div id="notasTab" class="tab-content">
                <div id="notesList"></div>
            </div>
        </div>

        <button class="fab" id="fabBtn">+</button>
    </div>

    <!-- MODAL TAREAS -->
    <div class="modal" id="modalTask">
        <div class="modal-content">
            <div class="modal-header" id="modalTaskHeader">+ Nueva Tarea</div>
            <form id="taskForm">
                <div class="form-group">
                    <label>Tarea *</label>
                    <input type="text" id="taskTitle" required placeholder="Ej: Enviar informe">
                </div>
                <div class="form-group">
                    <label>Fecha y Hora *</label>
                    <input type="datetime-local" id="taskDateTime" required>
                </div>
                <div class="form-group">
                    <label>Prioridad</label>
                    <select id="taskPriority">
                        <option value="normal">Normal</option>
                        <option value="important">Importante 🟡</option>
                        <option value="urgent">Urgente 🔴</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Notas</label>
                    <textarea id="taskNotes" placeholder="Detalles..."></textarea>
                </div>
                <div class="form-group">
                    <label>Alarma</label>
                    <select id="taskAlarm">
                        <option value="0">En el momento</option>
                        <option value="5">5 min antes</option>
                        <option value="10">10 min antes</option>
                        <option value="15" selected>15 min antes</option>
                        <option value="30">30 min antes</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Guardar</button>
                    <button type="button" class="btn-secondary" id="closeTaskModal">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL NOTAS -->
    <div class="modal" id="modalNote">
        <div class="modal-content">
            <div class="modal-header">+ Nueva Nota</div>
            <form id="noteForm">
                <div class="form-group">
                    <label>Título *</label>
                    <input type="text" id="noteTitle" required placeholder="Ej: Lista de compras">
                </div>
                <div class="form-group">
                    <label>Tipo</label>
                    <select id="noteType">
                        <option value="text">📝 Texto</option>
                        <option value="checklist">✓ Checklist</option>
                    </select>
                </div>
                <div class="form-group" id="textNoteGroup">
                    <label>Contenido</label>
                    <textarea id="noteContent" placeholder="Escribe aquí..."></textarea>
                </div>
                <div class="form-group" id="checklistNoteGroup" style="display:none;">
                    <label>Items (uno por línea)</label>
                    <textarea id="checklistItems" placeholder="Item 1&#10;Item 2&#10;Item 3"></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Guardar</button>
                    <button type="button" class="btn-secondary" id="closeNoteModal">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const TASKS_KEY = 'lj_tasks';
        const NOTES_KEY = 'lj_notes';
        let tasks = [];
        let notes = [];
        let editingTaskId = null;
        let searchQuery = '';
        let filterPriority = '';

        // ==================== INIT ====================
        function init() {
            loadTasks();
            loadNotes();
            renderTasks();
            renderNotes();
            setupEventListeners();
            updateHeader();
        }

        // ==================== STORAGE ====================
        function saveTasks() {
            localStorage.setItem(TASKS_KEY, JSON.stringify(tasks));
        }

        function loadTasks() {
            const data = localStorage.getItem(TASKS_KEY);
            tasks = data ? JSON.parse(data) : [];
        }

        function saveNotes() {
            localStorage.setItem(NOTES_KEY, JSON.stringify(notes));
        }

        function loadNotes() {
            const data = localStorage.getItem(NOTES_KEY);
            notes = data ? JSON.parse(data) : [];
        }

        // ==================== TASKS ====================
        function addTask(e) {
            e.preventDefault();
            const title = document.getElementById('taskTitle').value.trim();
            const dateTime = document.getElementById('taskDateTime').value;
            const priority = document.getElementById('taskPriority').value;
            const notes = document.getElementById('taskNotes').value.trim();
            const alarm = parseInt(document.getElementById('taskAlarm').value);

            if (!title || !dateTime) return alert('Completa los campos requeridos');

            if (editingTaskId) {
                const task = tasks.find(t => t.id === editingTaskId);
                if (task) {
                    task.title = title;
                    task.dateTime = dateTime;
                    task.priority = priority;
                    task.notes = notes;
                    task.alarm = alarm;
                }
                editingTaskId = null;
            } else {
                tasks.push({
                    id: Date.now(),
                    title,
                    dateTime,
                    priority,
                    notes,
                    alarm,
                    completed: false,
                    alarmSet: false
                });
            }

            tasks.sort((a, b) => new Date(a.dateTime) - new Date(b.dateTime));
            saveTasks();
            renderTasks();
            closeTaskModal();
        }

        function editTask(id) {
            const task = tasks.find(t => t.id === id);
            if (!task) return;
            editingTaskId = id;
            document.getElementById('taskTitle').value = task.title;
            document.getElementById('taskDateTime').value = task.dateTime;
            document.getElementById('taskPriority').value = task.priority;
            document.getElementById('taskNotes').value = task.notes || '';
            document.getElementById('taskAlarm').value = task.alarm;
            document.getElementById('modalTaskHeader').textContent = '✏️ Editar Tarea';
            openTaskModal();
        }

        function deleteTask(id) {
            if (confirm('¿Eliminar?')) {
                tasks = tasks.filter(t => t.id !== id);
                saveTasks();
                renderTasks();
            }
        }

        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                renderTasks();
            }
        }

        function renderTasks() {
            let filtered = tasks;
            if (searchQuery) {
                filtered = filtered.filter(t => t.title.toLowerCase().includes(searchQuery.toLowerCase()));
            }
            if (filterPriority) {
                filtered = filtered.filter(t => t.priority === filterPriority);
            }

            const container = document.getElementById('tasksList');
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty">No hay tareas</div>';
                return;
            }

            container.innerHTML = filtered.map(task => `
                <div class="task-item ${task.completed ? 'completed' : ''} ${task.priority}">
                    <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${task.id})">
                    <div class="task-content">
                        <div class="task-title">${task.title}</div>
                        <div class="task-meta">
                            🕐 ${new Date(task.dateTime).toLocaleString('es-ES')}
                            ${task.notes ? `<br>${task.notes}` : ''}
                        </div>
                    </div>
                    <div class="task-actions">
                        <button class="btn" onclick="editTask(${task.id})">✏️</button>
                        <button class="btn" onclick="deleteTask(${task.id})">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        // ==================== NOTES ====================
        function addNote(e) {
            e.preventDefault();
            const title = document.getElementById('noteTitle').value.trim();
            const type = document.getElementById('noteType').value;
            let content = null;

            if (type === 'text') {
                content = document.getElementById('noteContent').value;
            } else {
                const items = document.getElementById('checklistItems').value.split('\n').filter(i => i.trim());
                content = items.map(i => ({ text: i.trim(), done: false }));
            }

            notes.push({
                id: Date.now(),
                title,
                type,
                content,
                created: new Date().toLocaleString('es-ES')
            });

            saveNotes();
            renderNotes();
            closeNoteModal();
        }

        function deleteNote(id) {
            if (confirm('¿Eliminar?')) {
                notes = notes.filter(n => n.id !== id);
                saveNotes();
                renderNotes();
            }
        }

        function toggleChecklistItem(noteId, itemIndex) {
            const note = notes.find(n => n.id === noteId);
            if (note && note.content[itemIndex]) {
                note.content[itemIndex].done = !note.content[itemIndex].done;
                saveNotes();
                renderNotes();
            }
        }

        function renderNotes() {
            const container = document.getElementById('notesList');
            if (notes.length === 0) {
                container.innerHTML = '<div class="empty">No hay notas</div>';
                return;
            }

            container.innerHTML = notes.map(note => {
                if (note.type === 'text') {
                    return `
                        <div class="note-item">
                            <div style="flex:1;">
                                <div class="note-title">📝 ${note.title}</div>
                                <div class="note-content">${note.content}</div>
                                <div style="font-size:11px;color:#999;">${note.created}</div>
                            </div>
                            <button class="btn" onclick="deleteNote(${note.id})">🗑️</button>
                        </div>
                    `;
                } else {
                    return `
                        <div class="note-item">
                            <div style="flex:1;">
                                <div class="note-title">✓ ${note.title}</div>
                                <div>
                                    ${note.content.map((item, i) => `
                                        <div class="checklist-item">
                                            <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggleChecklistItem(${note.id}, ${i})">
                                            <span style="${item.done ? 'text-decoration:line-through;' : ''}">${item.text}</span>
                                        </div>
                                    `).join('')}
                                </div>
                                <div style="font-size:11px;color:#999;margin-top:8px;">${note.created}</div>
                            </div>
                            <button class="btn" onclick="deleteNote(${note.id})">🗑️</button>
                        </div>
                    `;
                }
            }).join('');
        }

        // ==================== UI ====================
        function updateHeader() {
            const today = new Date();
            document.getElementById('headerDate').textContent = today.toLocaleDateString('es-ES', {
                weekday: 'long',
                day: 'numeric',
                month: 'short'
            }).replace(/^\w/, c => c.toUpperCase());
        }

        function openTaskModal() {
            document.getElementById('modalTask').classList.add('active');
        }

        function closeTaskModal() {
            document.getElementById('modalTask').classList.remove('active');
            document.getElementById('taskForm').reset();
            document.getElementById('modalTaskHeader').textContent = '+ Nueva Tarea';
            editingTaskId = null;
        }

        function openNoteModal() {
            document.getElementById('modalNote').classList.add('active');
        }

        function closeNoteModal() {
            document.getElementById('modalNote').classList.remove('active');
            document.getElementById('noteForm').reset();
        }

        function setupEventListeners() {
            // Tabs
            document.getElementById('btnAgenda').addEventListener('click', () => {
                document.getElementById('agendaTab').classList.add('active');
                document.getElementById('notasTab').classList.remove('active');
                document.getElementById('btnAgenda').classList.add('active');
                document.getElementById('btnNotas').classList.remove('active');
            });

            document.getElementById('btnNotas').addEventListener('click', () => {
                document.getElementById('notasTab').classList.add('active');
                document.getElementById('agendaTab').classList.remove('active');
                document.getElementById('btnNotas').classList.add('active');
                document.getElementById('btnAgenda').classList.remove('active');
            });

            // Search & Filter
            document.getElementById('searchInput').addEventListener('input', (e) => {
                searchQuery = e.target.value;
                renderTasks();
            });

            document.getElementById('filterSelect').addEventListener('change', (e) => {
                filterPriority = e.target.value;
                renderTasks();
            });

            // FAB
            document.getElementById('fabBtn').addEventListener('click', () => {
                const isAgenda = document.getElementById('agendaTab').classList.contains('active');
                if (isAgenda) {
                    openTaskModal();
                } else {
                    openNoteModal();
                }
            });

            // Forms
            document.getElementById('taskForm').addEventListener('submit', addTask);
            document.getElementById('noteForm').addEventListener('submit', addNote);

            // Note type toggle
            document.getElementById('noteType').addEventListener('change', (e) => {
                if (e.target.value === 'text') {
                    document.getElementById('textNoteGroup').style.display = 'block';
                    document.getElementById('checklistNoteGroup').style.display = 'none';
                } else {
                    document.getElementById('textNoteGroup').style.display = 'none';
                    document.getElementById('checklistNoteGroup').style.display = 'block';
                }
            });

            // Close modals
            document.getElementById('closeTaskModal').addEventListener('click', closeTaskModal);
            document.getElementById('closeNoteModal').addEventListener('click', closeNoteModal);
            document.getElementById('modalTask').addEventListener('click', (e) => {
                if (e.target === document.getElementById('modalTask')) closeTaskModal();
            });
            document.getElementById('modalNote').addEventListener('click', (e) => {
                if (e.target === document.getElementById('modalNote')) closeNoteModal();
            });
        }

        // ==================== START ====================
        window.addEventListener('load', init);
    </script>
</body>
</html>
